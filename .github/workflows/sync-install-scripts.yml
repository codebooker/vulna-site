name: sync-install-scripts

# Keep the install scripts served at vulna.dev in lockstep with the canonical
# copies in codebooker/vulna. They are mirrored verbatim (identical bytes and
# checksums) so a user who reviews vulna.dev/install.sh sees exactly what the
# product repo ships. Runs weekly and on demand.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch canonical scripts
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/codebooker/vulna/main/scripts"
          for f in install.sh install-scout.sh install-relay.sh; do
            curl -fsSL "$base/$f" -o "$f.new"
            chmod +x "$f.new"
            mv "$f.new" "$f"
          done
      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- install.sh install-scout.sh install-relay.sh; then
            echo "install scripts already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add install.sh install-scout.sh install-relay.sh
          git commit -m "Sync install scripts from codebooker/vulna"
          git push
