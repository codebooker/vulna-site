<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142 134" role="img" aria-label="Vulna mark">
  <title>Vulna mark</title>
  <desc>The Vulna shield: split between deep teal and brighter teal, containing a bold V, dissolving into scattered pixels on its left side.</desc>

  <!-- Pixel-dissolve motif -->
  <rect x="0"  y="52" width="9"  height="9" fill="#006666"/>
  <rect x="14" y="38" width="7"  height="7" fill="#00A3A3"/>
  <rect x="10" y="66" width="12" height="8" fill="#013B3B"/>
  <rect x="26" y="54" width="8"  height="8" fill="#00A3A3"/>
  <rect x="22" y="24" width="6"  height="6" fill="#006666"/>
  <rect x="30" y="80" width="10" height="7" fill="#00A3A3"/>
  <rect x="18" y="92" width="7"  height="7" fill="#006666"/>
  <rect x="34" y="38" width="9"  height="9" fill="#013B3B"/>
  <rect x="40" y="64" width="8"  height="8" fill="#006666"/>
  <rect x="44" y="88" width="7"  height="7" fill="#00A3A3"/>
  <rect x="36" y="16" width="7"  height="7" fill="#00A3A3"/>
  <rect x="2"  y="30" width="10" height="4" fill="#00A3A3"/>
  <rect x="6"  y="82" width="14" height="4" fill="#006666"/>

  <!-- Shield -->
  <g transform="translate(46,0)">
    <path d="M42 0 L0 16 L0 58 C0 92 20 114 42 124 L42 0 Z" fill="#013B3B"/>
    <path d="M42 0 L84 16 L84 58 C84 92 64 114 42 124 L42 0 Z" fill="#008080"/>
    <path d="M14 34 L34 34 L42 62 L50 34 L70 34 L50 96 L34 96 Z" fill="#FFFFFF"/>
    <path d="M42 62 L50 34 L70 34 L50 96 L42 96 Z" fill="#013B3B" opacity="0.28"/>
  </g>
</svg>
